;=====================================================
;     Colors & Settings
;=====================================================

[colors]
background = #1d1f21
foreground = #c5c8c6
red = #cc342b
green = #198844
orange = #fba922
blue = #3971ed
purple = a36ac7

[settings]
throttle-output = 5
throttle-output-for = 10
throttle-input-for = 30
compositing-background = source
compositing-foreground = source
compositing-overline = source
compositing-underline = source
compositing-border = source
screenchange-reload = true
;format-foreground = ${colors.foreground}
;format-background = ${colors.background}

;=====================================================
;    Master Bar
;=====================================================

[bar/master]
monitor = eDP1

width = 100%
height = 20

bottom = false
line-size = 2

font-0 = "Input Mono Compressed:size=10:antialias=false;2"
font-1 = "Font Awesome 5 Brands:pixelsize=11;1"
font-2 = "MaterialIcons:size=10:antialias=false;2"
font-3 = "icomoon:size=10:antialias=false;2"
font-4 = "Ubuntu Nerd Font:size=10:antialias=false;2"

offset-x = 0
offset-y = 0

padding = 1
module-margin = 1
border-top-size = 3
border-top-color = ${colors.background}
border-bottom-size = 3
border-bottom-color = ${colors.background}

fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

separator = │

enable-ipc = true

