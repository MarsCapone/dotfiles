;=====================================================
;   Google Play Music
;=====================================================
[module/gpmdp]
type = custom/script
exec = ~/bin/gpmdp.py
interval = 3

;=====================================================
;   Date
;=====================================================
[module/date]
type = internal/date
format = <label>
interval = 3600
date = %d %m %Y
label = %date%

;=====================================================
;   Time
;=====================================================
[module/time]
type = internal/date
format = <label>
interval = 1
time = %H %M %S
label = %time%

;=====================================================
;   Menu
;=====================================================
[module/jgmenu]
type = custom/script
label = %output%
interval = 10
exec = echo " [] "
click-left = "jgmenu_run >/dev/null 2>&1 &"
click-right = exo-open $HOME/.config/jgmenu/jgmenurc
format-background = ${colors.foreground}
format-foreground = ${colors.background}

;=====================================================
;   Workspaces
;=====================================================
[module/workspaces]
type = internal/xworkspaces
pin-workspaces = false
enable-click = true
enable-scroll = true
icon-0 = 1;ţĘ│
icon-1 = 2;´éČ
icon-2 = 3;ţČĄ
icon-3 = 4;ţĘ┤
icon-4 = 5;ţĘČ
icon-5 = 6;´ââ
icon-6 = 7;´łŤ
icon-7 = 8;´éâ
icon-8 = 9;ţ×Ľ
icon-9 = 10;´îÇ
icon-default =
format = <label-state>
label-active = " %name% "
label-empty = " %name% "
label-active-foreground = ${colors.background}
label-active-background = ${colors.red}
label-empty-foreground = ${colors.foreground}

;=====================================================
;   Network
;=====================================================
[module/network]
type = custom/script
exec = check-network
click-left = networkmanager_dmenu &
click-right = networkmanager_dmenu &
tail = true

;=====================================================
;   Windows Switch
;=====================================================
[module/window_switch]
type = custom/script
interval = 5
click-left = skippy-xd
click-right = skippy-xd
label = "ţ¬«"
format = <label>

;=====================================================
;   CPU
;=====================================================
[module/coreuse]
type = internal/cpu
interval = 1
format = <label><ramp-coreload>
label = %{A1:termite --exec=htop & disown:}ţĘč %percentage%% %{A}
ramp-coreload-0 = Ôľé
ramp-coreload-1 = Ôľâ
ramp-coreload-2 = Ôľä
ramp-coreload-3 = Ôľů
ramp-coreload-4 = Ôľć
ramp-coreload-5 = Ôľç
ramp-coreload-0-foreground = ${colors.foreground}
ramp-coreload-1-foreground = ${colors.foreground}
ramp-coreload-2-foreground = ${colors.orange}
ramp-coreload-3-foreground = ${colors.orange}
ramp-coreload-4-foreground = ${colors.red}
ramp-coreload-5-foreground = ${colors.red}

;=====================================================
;   Memory
;=====================================================
[module/memory]
type = internal/memory
interval = 3
format = <label>
label = %{A1:termite --exec=htop & disown:}´őŤ %percentage_used%%%{A}

;=====================================================
;   PKG
;=====================================================
[module/pkg]
type = custom/script
exec = updates.sh
exec-if = "ping -q -w 2 -c 1 176.34.135.167 > /dev/null"
label = %{A1:termite --exec=pacli & disown:} %{A3:termite --exec=pacli & disown:}%output%%{A} %{A}
tail = true

;=====================================================
;   Volume
;=====================================================
[module/volume]
type = internal/volume
master-mixer = Master
format-volume-padding   = 1
label-volume-foreground = ${colors.foreground}
;label-volume  = %{A3:pavucontrol & disown:}%percentage%% %{A}
label-volume  = %{A3:pavucontrol & disown:}%percentage%%{A}%
format-volume = <ramp-volume> <label-volume>
label-muted   = "ţ«ë muted"
ramp-volume-0 = ţ«ë
ramp-volume-1 = ţ«ő
ramp-volume-2 = ţ«Ő
ramp-volume-3 = ţ«î
label-muted-foreground   = ${colors.red}
ramp-volume-0-foreground = ${colors.foreground}
ramp-volume-1-foreground = ${colors.blue}
ramp-volume-2-foreground = ${colors.orange}
ramp-volume-3-foreground = ${colors.red}

;=====================================================
;   Battery 0
;=====================================================
[module/battery0]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 98
poll-interval = 5
time-format = %H:%M

format-charging    = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full        = <ramp-capacity>

label-full = "full"

ramp-capacity-0 = "´ëä"
ramp-capacity-1 = "´ëâ"
ramp-capacity-2 = "´ëé"
ramp-capacity-3 = "´ëü"
ramp-capacity-4 = "´ëÇ"
ramp-capacity-0-foreground = ${colors.red}
ramp-capacity-1-foreground = #ffa900
ramp-capacity-foreground   = ${colors.blue}

bar-capacity-width = 15
animation-charging-0 = "´âž ´ëä"
animation-charging-1 = "´âž ´ëâ"
animation-charging-2 = "´âž ´ëé"
animation-charging-3 = "´âž ´ëü"
animation-charging-4 = "´âž ´ëÇ"
animation-charging-framerate = 750

;=====================================================
;   Battery 1
;=====================================================
[module/battery1]
inherit = module/battery0
battery = BAT1

;=====================================================
;   Redshift
;=====================================================
[module/redshift]
type = custom/script
tail = true
exec = toggle.sh -r
label = %{A1:toggle.sh -r -tg &:}%output%%{A}
click-left = toggle.sh -r -tg &

;=====================================================
;   Volume bar
;=====================================================
[module/volume-bar]
type = internal/volume
bar-volume-font = 2
bar-volume-width = 20
format-volume = <label-volume> <bar-volume>
label-volume = "´ÇĘ "
label-muted = "´ÇŽ  mute"
label-volume-foreground = #B6C2E7
format-muted-foreground = #E76BB4
bar-volume-foreground-0 = #92A3F7
bar-volume-foreground-1 = #92A3F7
bar-volume-foreground-2 = #6BB3E7
bar-volume-foreground-3 = #6BB3E7
bar-volume-foreground-4 = #6BB3E7
bar-volume-foreground-5 = #6BE7D8
bar-volume-foreground-6 = #6BE7D8
bar-volume-gradient = true
bar-volume-indicator = |
bar-volume-fill = ÔÇó
bar-volume-empty = ┬Ě
bar-volume-empty-foreground = #666666
